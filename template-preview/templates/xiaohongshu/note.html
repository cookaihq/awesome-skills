<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>{{TITLE}} · {{NICKNAME}}</title>
<style>
  :root { --bg:#fff; --pink:#ff2e4d; --muted:#999; --text:#333; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:#000; color:var(--text);
         font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif; }
  .phone { max-width:414px; min-height:100vh; margin:0 auto; background:var(--bg);
           box-shadow:0 0 24px rgba(0,0,0,.18); display:flex; flex-direction:column; }
  .topbar { display:flex; align-items:center; gap:10px; padding:12px 14px; }
  .topbar a.back { font-size:22px; color:#222; text-decoration:none; line-height:1; }
  .topbar .who { display:flex; align-items:center; gap:8px; min-width:0; }
  .topbar .avatar { width:30px; height:30px; border-radius:50%; object-fit:cover; }
  .topbar .nick { font-size:14px; font-weight:600; color:#222; white-space:nowrap;
                  overflow:hidden; text-overflow:ellipsis; }
  .topbar .follow { margin-left:auto; flex:0 0 auto; font-size:13px; color:#fff;
                    background:var(--pink); border-radius:16px; padding:5px 16px; }
  /* 横向轮播：scroll-snap，无第三方库 */
  .swiper { position:relative; background:#000; }
  .track { display:flex; overflow-x:auto; scroll-snap-type:x mandatory;
           -webkit-overflow-scrolling:touch; scrollbar-width:none; }
  .track::-webkit-scrollbar { display:none; }
  .slide { flex:0 0 100%; scroll-snap-align:center; height:62vh;
           display:flex; align-items:center; justify-content:center; }
  .slide img { width:100%; height:100%; object-fit:contain; display:block; }
  .dots { position:absolute; left:0; right:0; bottom:10px; display:flex;
          justify-content:center; gap:6px; pointer-events:none; }
  .dots.hidden { display:none; }
  .dot { width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,.45); }
  .dot.active { background:#fff; }
  /* 左右翻页按钮（方便电脑鼠标操作）；默认隐藏，多图时由 JS 显示 */
  .nav { position:absolute; top:50%; transform:translateY(-50%); z-index:3;
         width:38px; height:38px; border-radius:50%; border:none; cursor:pointer;
         display:none; align-items:center; justify-content:center; padding:0;
         background:rgba(0,0,0,.45); color:#fff; font-size:24px; line-height:1;
         opacity:.28;  /* 默认很淡、不抢眼 */
         -webkit-tap-highlight-color:transparent; transition:opacity .15s, background .15s; }
  .nav:hover { opacity:1; background:rgba(0,0,0,.55); }  /* 悬停变明显 */
  .nav.prev { left:10px; }
  .nav.next { right:10px; }
  .nav:disabled { opacity:.12; cursor:default; }  /* 到头/到尾更淡 */
  .nav:disabled:hover { opacity:.12; background:rgba(0,0,0,.45); }
  .content { padding:14px 16px 8px; }
  .title { font-size:18px; font-weight:700; line-height:1.4; color:#222; }
  .body { font-size:15px; line-height:1.7; color:#333; margin-top:10px; white-space:normal; }
  .body p { margin:0 0 10px; }
  .footbar { margin-top:auto; position:sticky; bottom:0; display:flex; align-items:center;
             gap:18px; padding:10px 16px; background:#fff; border-top:1px solid #eee;
             font-size:13px; color:var(--muted); }
  .footbar .ipt { flex:1; background:#f3f3f3; border-radius:16px; padding:8px 14px; color:#aaa; }
  .footbar .act { display:flex; align-items:center; gap:4px; }
</style>
</head>
<body>
<div class="phone">
  <div class="topbar">
    <a class="back" href="index.html">‹</a>
    <span class="who"><img class="avatar" src="{{AVATAR}}" alt=""><span class="nick">{{NICKNAME}}</span></span>
    <span class="follow">关注</span>
  </div>
  <div class="swiper">
    <div class="track"><!--SLIDES--></div>
    <button class="nav prev" type="button" aria-label="上一张">‹</button>
    <button class="nav next" type="button" aria-label="下一张">›</button>
    <div class="dots"><!--DOTS--></div>
  </div>
  <div class="content">
    <div class="title">{{TITLE}}</div>
    <!--BODY-->
  </div>
  <div class="footbar">
    <span class="ipt">说点什么...</span>
    <span class="act">♥ {{LIKES_NOTE}}</span>
    <span class="act">⭐ 收藏</span>
    <span class="act">💬 评论</span>
  </div>
</div>
<script>
// 圆点高亮 + 左右翻页按钮；无 JS 时仍可滑动/滚动浏览，按钮保持隐藏
(function () {
  var track = document.querySelector('.track');
  var dots = Array.prototype.slice.call(document.querySelectorAll('.dot'));
  var prev = document.querySelector('.nav.prev');
  var next = document.querySelector('.nav.next');
  var n = document.querySelectorAll('.slide').length;
  if (!track || n < 2) return;          // 单图：不显示圆点也不显示按钮
  if (prev) prev.style.display = 'flex';
  if (next) next.style.display = 'flex';
  function cur() { return Math.round(track.scrollLeft / track.clientWidth); }
  function go(dir) {
    track.scrollBy({ left: dir * track.clientWidth, behavior: 'smooth' });
  }
  if (prev) prev.addEventListener('click', function () { go(-1); });
  if (next) next.addEventListener('click', function () { go(1); });
  function sync() {
    var i = cur();
    dots.forEach(function (d, k) { d.classList.toggle('active', k === i); });
    if (prev) prev.disabled = (i <= 0);          // 到头/到尾时置灰对应按钮
    if (next) next.disabled = (i >= n - 1);
  }
  track.addEventListener('scroll', function () { window.requestAnimationFrame(sync); });
  sync();
})();
</script>
</body>
</html>

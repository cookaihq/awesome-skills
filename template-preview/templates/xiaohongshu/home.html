<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>{{NICKNAME}} 的主页</title>
<style>
  :root { --bg:#f5f5f5; --card:#fff; --pink:#ff2e4d; --muted:#999; --text:#333; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text);
         font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif; }
  .phone { max-width:414px; min-height:100vh; margin:0 auto; background:var(--bg);
           box-shadow:0 0 24px rgba(0,0,0,.06); }
  .topbar { display:flex; align-items:center; justify-content:space-between;
            padding:14px 16px; color:#222; font-size:18px; }
  .topbar .ico { font-size:20px; color:#333; }
  .profile { padding:8px 18px 16px; }
  .prow { display:flex; align-items:center; gap:16px; }
  .avatar { width:76px; height:76px; border-radius:50%; object-fit:cover;
            border:2px solid #fff; box-shadow:0 1px 6px rgba(0,0,0,.12); }
  .stats { flex:1; display:flex; justify-content:space-around; text-align:center; }
  .stats .n { font-size:17px; font-weight:700; }
  .stats .l { font-size:12px; color:var(--muted); margin-top:2px; }
  .name { font-size:19px; font-weight:700; margin:12px 0 4px; }
  .redid { font-size:12px; color:var(--muted); }
  .bio { font-size:13px; color:#555; margin:8px 0 14px; line-height:1.5; }
  .actions { display:flex; gap:10px; }
  .btn { flex:1; text-align:center; padding:8px 0; border-radius:20px; font-size:14px;
         border:1px solid #ddd; color:#333; background:#fff; }
  .btn.primary { background:var(--pink); color:#fff; border-color:var(--pink); }
  .tabs { display:flex; justify-content:space-around; border-bottom:1px solid #eee;
          background:#fff; position:sticky; top:0; z-index:2; }
  .tab { padding:12px 0; font-size:14px; color:var(--muted); }
  .tab.active { color:#222; font-weight:600; border-bottom:2px solid #222; }
  .grid { column-count:2; column-gap:8px; padding:8px; }
  .card { break-inside:avoid; background:var(--card); border-radius:10px; overflow:hidden;
          margin-bottom:8px; box-shadow:0 1px 4px rgba(0,0,0,.05); }
  /* 真实笔记卡是可点击链接：去掉下划线、继承文字色、整块可点 */
  a.card-link { display:block; text-decoration:none; color:inherit;
                -webkit-tap-highlight-color:transparent; }
  a.card-link:active { opacity:.85; }
  .card .cover { width:100%; display:block; }
  .card-body { padding:8px 10px 10px; }
  .card-title { font-size:13px; line-height:1.4; color:#222;
                display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .card-foot { display:flex; align-items:center; justify-content:space-between; margin-top:8px; }
  .author { display:flex; align-items:center; gap:5px; min-width:0; }
  .avatar-sm { width:18px; height:18px; border-radius:50%; object-fit:cover; }
  .author-name { font-size:11px; color:var(--muted); white-space:nowrap;
                 overflow:hidden; text-overflow:ellipsis; }
  .likes { font-size:11px; color:var(--muted); white-space:nowrap; }
  .tabbar { position:sticky; bottom:0; display:flex; justify-content:space-around;
            background:#fff; border-top:1px solid #eee; padding:8px 0; font-size:11px; color:var(--muted); }
  .tabbar .mid { color:var(--pink); font-size:22px; }
</style>
</head>
<body>
<div class="phone">
  <div class="topbar"><span class="ico">‹</span><span>{{NICKNAME}}</span><span class="ico">⋯</span></div>
  <div class="profile">
    <div class="prow">
      <img class="avatar" src="{{AVATAR}}" alt="头像">
      <div class="stats">
        <div><div class="n">{{FOLLOWING}}</div><div class="l">关注</div></div>
        <div><div class="n">{{FOLLOWERS}}</div><div class="l">粉丝</div></div>
        <div><div class="n">{{LIKES}}</div><div class="l">获赞与收藏</div></div>
      </div>
    </div>
    <div class="name">{{NICKNAME}}</div>
    <div class="redid">小红书号：{{RED_ID}}</div>
    <div class="bio">{{BIO}}</div>
    <div class="actions">
      <span class="btn primary">关注</span>
      <span class="btn">编辑资料</span>
    </div>
  </div>
  <div class="tabs">
    <div class="tab active">笔记</div><div class="tab">收藏</div><div class="tab">赞过</div>
  </div>
  <div class="grid"><!--CARDS--></div>
  <div class="tabbar">
    <span>首页</span><span>购物</span><span class="mid">＋</span><span>消息</span><span>我</span>
  </div>
</div>
</body>
</html>
